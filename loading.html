<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#006674", // Teal
                        "on-primary": "#FFFFFF",
                        secondary: "#1B2A41", // Navy
                        "on-secondary": "#FFFFFF",
                        surface: "#FFFFFF",
                        "surface-dim": "#F8F8F8",
                        "on-surface": "#1B2A41",
                        "on-surface-variant": "#44474E",
                        outline: "#74777F",
                        "outline-variant": "#C4C6D0",
                        "primary-container": "#A6EDFF",
                        "on-primary-container": "#001F24",
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "2xl": "2.5rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Public Sans", "sans-serif"],
                        display: ["Public Sans", "sans-serif"],
                        body: ["Public Sans", "sans-serif"],
                        label: ["Public Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #F8F8F8;
            margin: 0;
            overflow: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Synapse Animation */
        @keyframes synapse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); filter: blur(2px); }
            50% { opacity: 1; transform: scale(1.2); filter: blur(0px); }
        }

        .synapse {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #006674;
            border-radius: 50%;
            filter: blur(2px);
        }

        .synapse-1 { top: 20%; left: 30%; animation: synapse-glow 2s infinite ease-in-out; }
        .synapse-2 { top: 50%; left: 70%; animation: synapse-glow 2.5s infinite ease-in-out 0.5s; }
        .synapse-3 { top: 80%; left: 40%; animation: synapse-glow 1.8s infinite ease-in-out 1s; }

        /* Neural Pulse */
        @keyframes brain-pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .neural-container {
            animation: brain-pulse 3s infinite ease-in-out;
        }

        /* Progress Bar Animation */
        @keyframes progress-load {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        .loading-progress {
            animation: progress-load 4s infinite ease-in-out;
        }

        /* Text Fade */
        @keyframes text-breathing {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .breathing-text {
            animation: text-breathing 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
<!-- Top Brand Logo (Subtle) -->
<header class="fixed top-12 left-0 w-full flex justify-center">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<span class="font-headline text-xl font-black tracking-tight text-secondary">EduGram</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex flex-col items-center max-w-lg w-full space-y-12">
<!-- Central Loader Element -->
<div class="relative w-48 h-48 flex items-center justify-center">
<!-- Decorative Background Glow -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl"></div>
<!-- Neural Network Stylized Icon -->
<div class="neural-container relative z-10">
<svg class="text-primary" fill="none" height="120" viewbox="0 0 24 24" width="120" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.58 20 4 16.42 4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12C20 16.42 16.42 20 12 20Z" fill="currentColor" fill-opacity="0.1"></path>
<path d="M13 13V17H11V13H7V11H11V7H13V11H17V13H13Z" fill="currentColor"></path>
<circle class="animate-[spin_10s_linear_infinite]" cx="12" cy="12" r="9" stroke="currentColor" stroke-dasharray="4 4" stroke-width="0.5"></circle>
</svg>
<!-- Synapse Dots -->
<div class="synapse synapse-1"></div>
<div class="synapse synapse-2"></div>
<div class="synapse synapse-3"></div>
<!-- Center Icon -->
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-5xl text-primary" style="font-variation-settings: 'FILL' 1;">hub</span>
</div>
</div>
</div>
<!-- Loading Feedback -->
<div class="text-center space-y-4 w-full">
<h2 class="text-secondary font-headline text-lg font-semibold breathing-text">Preparing your medical insights...</h2>
<div class="w-64 h-1.5 bg-outline-variant/30 rounded-full mx-auto overflow-hidden">
<div class="loading-progress h-full bg-primary rounded-full"></div>
</div>
</div>
<!-- Study Tip Card -->
<div class="bg-surface shadow-[0_20px_50px_rgba(27,42,65,0.08)] rounded-xl p-8 w-full border border-outline-variant/20 transform transition-all hover:scale-[1.02]">
<div class="flex items-start gap-4">
<div class="p-3 bg-primary-container rounded-lg">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<div class="space-y-2">
<span class="text-xs font-bold uppercase tracking-widest text-primary/70">Study Tip of the Day</span>
<p class="text-secondary font-body text-base leading-relaxed">
                        "Spaced repetition is <span class="font-bold text-primary">2x more effective</span> for long-term retention than cramming. Our AI is currently optimizing your review schedule."
                    </p>
</div>
</div>
</div>
</main>
<!-- Bottom Aesthetic Detail -->
<footer class="fixed bottom-12 text-center">
<p class="text-outline text-xs font-label tracking-wide uppercase">NeuroFeed v2.4.0 • Clinical Learning Environment</p>
</footer>
<!-- Interactive Atmospheric Layer -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden" id="ambient-layer"></div>
<script>
        // Simple ambient particle effect for "Neural" feel
        const container = document.getElementById('ambient-layer');
        const particleCount = 15;

        for (let i = 0; i < particleCount; i++) {
            const dot = document.createElement('div');
            const size = Math.random() * 4 + 2;
            dot.className = 'absolute bg-primary/10 rounded-full';
            dot.style.width = `${size}px`;
            dot.style.height = `${size}px`;
            dot.style.left = `${Math.random() * 100}%`;
            dot.style.top = `${Math.random() * 100}%`;
            
            // Random movement
            const duration = Math.random() * 20 + 10;
            const delay = Math.random() * -20;
            
            dot.animate([
                { transform: `translate(0, 0) scale(1)`, opacity: 0 },
                { transform: `translate(${Math.random() * 200 - 100}px, ${Math.random() * 200 - 100}px) scale(1.5)`, opacity: 0.4 },
                { transform: `translate(${Math.random() * 400 - 200}px, ${Math.random() * 400 - 200}px) scale(1)`, opacity: 0 }
            ], {
                duration: duration * 1000,
                iterations: Infinity,
                delay: delay * 1000,
                easing: 'ease-in-out'
            });

            container.appendChild(dot);
        }

        // Dynamic Loading Text Switcher
        const texts = [
            "Preparing your medical insights...",
            "Loading your personalized study feed...",
            "Connecting neural synapses...",
            "Syncing clinical evidence data...",
            "Personalizing your knowledge graph..."
        ];
        let currentIdx = 0;
        const textElement = document.querySelector('.breathing-text');

        setInterval(() => {
            textElement.style.opacity = 0;
            setTimeout(() => {
                currentIdx = (currentIdx + 1) % texts.length;
                textElement.innerText = texts[currentIdx];
                textElement.style.opacity = 1;
            }, 500);
        }, 4000);
    </script>
</body></html>
