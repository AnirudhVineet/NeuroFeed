services:
  - type: web
    name: neurofeed-api
    runtime: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -e .
    startCommand: uvicorn neurofeed.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: GROQ_CHAT_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_REASONING_MODEL
        value: openai/gpt-oss-120b
      - key: GROQ_STT_MODEL
        value: whisper-large-v3
      - key: FEATHERLESS_MODEL
        value: meta-llama/Meta-Llama-3.1-70B-Instruct
      - key: FEATHERLESS_MAX_CONCURRENCY
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
